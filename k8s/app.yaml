apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrasprint-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrasprint-api
  template:
    metadata:
      labels:
        app: infrasprint-api
    spec:
      containers:
        - name: infrasprint-api
          image: infrasprint-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: infrasprint-api
  namespace: default
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  selector:
    app: infrasprint-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
